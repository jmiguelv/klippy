services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: klippy-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:alpine
    container_name: klippy-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: klippy-backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./harvester/data:/app/data
    depends_on:
      - qdrant
      - redis

volumes:
  qdrant_storage:
