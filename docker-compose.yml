services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: klippy-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage

  redis:
    image: redis:alpine
    container_name: klippy-redis
    ports:
      - "6379:6379"

  redis-insight:
    image: redis/redisinsight:latest
    container_name: klippy-redis-insight
    ports:
      - "5540:5540"
    depends_on:
      - redis

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: klippy-phoenix
    ports:
      - "6006:6006" # Arize Phoenix UI
    environment:
      - PHOENIX_HOST=0.0.0.0
      - PHOENIX_PORT=6006

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: klippy-backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      - EMBED_MODEL=${EMBED_MODEL:-jinaai/jina-embeddings-v5-text-small}
      - EMBED_DEVICE=${EMBED_DEVICE:-}
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006
    volumes:
      # Backend reads from processed/ (or raw/ if we point it there)
      - ./data:/app/data
      - ./config:/app/config
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - qdrant
      - redis
      - phoenix

  harvester:
    profiles: ["manual"]
    build:
      context: ./harvester
      dockerfile: Dockerfile
    container_name: klippy-harvester
    environment:
      - CLICKUP_API_KEY=${CLICKUP_API_KEY}
      - CLICKUP_WORKSPACE_ID=${CLICKUP_WORKSPACE_ID}
      - CLICKUP_IGNORE_SPACES=${CLICKUP_IGNORE_SPACES}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORGS=${GITHUB_ORGS}
      - GITHUB_USERS=${GITHUB_USERS}
      - GITHUB_IGNORE_REPOS=${GITHUB_IGNORE_REPOS}
      - DATA_DIR=/app/data/raw
      - STATE_FILE=/app/data/state.json
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
    restart: "no"
